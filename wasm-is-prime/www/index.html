<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Is Prime App!</title>
  </head>
  <body>
    <!--
      noscript: Shown to users with JavaScript disabled.
      This app requires JS because WASM is loaded via JS.
    -->
    <noscript>
      This page requires JavaScript and WebAssembly.
      Please enable JavaScript in your browser.
    </noscript>

    <!--
      bootstrap.js is the webpack entry point generated by create-wasm-app.
      It handles async loading of the .wasm binary before index.js runs.
    -->
    <script src="./bootstrap.js"></script>

    <!-- User input form -->
    <form>
      Enter a number:
      <input type="text" value="2" id="PrimeNumber"><br>
    </form>

    <!-- Trigger button — event listener attached in index.js -->
    <button id="CheckNumber">Check Number</button>

    <!--
      Canvas element: 100x100 pixel drawing surface.
      Rust returns a result code; JS draws a colored circle here.
      The border makes it visible even before any drawing occurs.
    -->
    <canvas
      id="board"
      width="100"
      height="100"
      style="border: 1px solid grey">
      Your browser does not support HTML5 canvas.
    </canvas>
  </body>
</html>
